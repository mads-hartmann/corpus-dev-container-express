tasks:
  installDeps:
    name: Install dependencies
    description: Install npm dependencies from the lockfile.
    command: |
      npm ci
    triggeredBy:
      - manual
      - postDevcontainerStart
      - prebuild

services:
  devServer:
    name: Express App
    description: Run the Express development server.
    triggeredBy:
      - manual
      - postEnvironmentStart
    commands:
      start: |
        ona environment port open 3000 --dont-wait --admission creator_only --name "Express App"
        npm start
      ready: |
        curl -sf http://localhost:3000 > /dev/null

tasks:
  installDeps:
    name: Install dependencies
    description: Install Node.js dependencies from the lockfile.
    command: |
      npm ci
    triggeredBy:
      - manual
      - postDevcontainerStart
      - prebuild

services:
  devServer:
    name: Express Dev Server
    description: Run the Express application on port 3000.
    commands:
      start: |
        npm start
      ready: |
        curl -sf http://localhost:3000 > /dev/null
